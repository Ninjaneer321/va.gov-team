name: Benefits Management Tools General Issue
description: Create a new issue (Task, Bug, Enhancement, Question, Design, Spike, or Other)
title: "[UX|ENG|Content|Product] [Issue Type] Short descriptive title"
labels: ["benefits-management-tools"]
assignees: []

body:
  - type: dropdown
    id: feature
    attributes:
      label: Feature
      description: Select the feature this issue belongs to.
      options:
        - document-status
        - evidence-requests
        - decision-letter-notifications
        - intent-to-file (ITF)
        - platform-health
        - other
    validations:
      required: true

  - type: input
    id: feature-other
    attributes:
      label: Specify Feature (if "Other")
      description: If you selected "other" above, specify the feature name. Leave blank otherwise.
      placeholder: Enter feature name…

  - type: dropdown
    id: team
    attributes:
      label: Team
      description: Select the team this issue belongs to.
      options:
        - "bmt-team-1 (Mavericks)"
        - "bmt-team-2 (Bee's Knees)"
        - "bmt-team-3 (Phoenix)"
        - "Decision Reviews"
        - other
    validations:
      required: true

  - type: input
    id: team-other
    attributes:
      label: Specify Team (if "Other")
      description: If you selected "other" above, specify the team name. Leave blank otherwise.
      placeholder: Enter team name…

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: |
        Select the primary discipline this work is for. Use these abbreviations in your issue title: UX, ENG, Content, Product.
      options:
        - UX
        - Engineering
        - Content
        - Product
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: Select the type of issue you are creating.
      options:
        - Task
        - Bug
        - Enhancement
        - Question
        - Design
        - Spike
        - Other
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a short, descriptive summary of the issue.
      placeholder: "Short summary of the issue…"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description / Context
      description: |
        Provide details about the issue. Use the guidance below based on the Issue Type you selected.
      placeholder: |
        For **Bug**:
        1) Steps to reproduce…
        2) Expected behavior…
        3) Actual behavior…
        4) Environment (URL, browser, device)…

        For **Task / Enhancement / Other**:
        - Background/context…
        - What needs to be achieved (outcomes, not implementation)…

        For **Question**:
        - What decision or clarification is needed?
        - Options considered (if any)…
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks / Dependencies
      description: Capture any known risks, blockers, or dependencies related to this issue.
      placeholder: |
        - Risk: Potential GA event volume cost
        - Dependency: Requires input from vfs-analytics
        - Dependency: Backend cleanup (EVSS removal)
    validations:
      required: false

  # ---------- Design work ----------
  - type: textarea
    id: design-details
    attributes:
      label: Design Details (if applicable)
      description: Complete this section for Design issues (or if design updates are required).
      placeholder: |
        Problem to solve:
        Users affected / scenarios:
        Success criteria:
        Deliverables (wireframes, mockups, prototypes, content updates):
        Figma link(s):
        Reviewers / stakeholders:
        Accessibility considerations:
    validations:
      required: false

  # ---------- Accessibility considerations ----------
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility Considerations (if applicable)
      description: |
        Note any accessibility considerations relevant to this work.
        For dedicated accessibility work requests, use Tracy's [Accessibility Practice template](https://github.com/department-of-veterans-affairs/va.gov-team/issues/new?template=benefits-accessibility-practice-template.md).
      placeholder: |
        If this issue has accessibility implications, note them here.
        Examples:
        - Keyboard navigation & focus order
        - Screen reader support (NVDA/JAWS/VoiceOver/TalkBack)
        - Color and contrast
        - Semantics/landmarks/roles
        - Forms, labels, and error messaging
        - Motion/animation & prefers-reduced-motion
        - Reflow/zoom/responsive behavior
    validations:
      required: false

  # ---------- Acceptance Criteria ----------
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria / Definition of Done
      description: Define what "done" means for this issue. Use bullets or checkboxes.
      placeholder: |
        - [ ] Outcome 1 met
        - [ ] Outcome 2 met
        - [ ] Verified by reviewer(s)
    validations:
      required: false

  # ---------- Links & resources ----------
  - type: textarea
    id: resources
    attributes:
      label: Links & Resources
      description: Add any relevant links (design files, specs, logs, PRs, documentation).
      placeholder: |
        - Figma:
        - Related issues/PRs:
        - Monitoring/logs:
        - Docs:
    validations:
      required: false

  # ---------- Reminders for Epic, Estimation & Priority (right sidebar) ----------
  - type: markdown
    attributes:
      value: |
        ---
        ✅ **Quick Reminders (Right Sidebar in GitHub):**

        **Epic / Parent work**
        - Link this issue to the correct **Epic or Super Epic** in the right sidebar.
        - Make sure the parent Epic clearly reflects the outcome this work contributes to.

        **Estimate**
        - During refinement or sprint planning, set an **estimate in the right sidebar** using your team's standard system (story points or similar).
        - Suggested effort scale (if applicable):
          - `1` – Very minuscule, less than a day
          - `2` – Small, ~1 day
          - `3` – Medium sized, a couple of days
          - `5` – Bigger effort, about a week
          - `8` – Likely about a full sprint
          - `13` – Big effort, multiple sprints (consider breaking down)

        **Priority**
        - Apply your team's **priority / severity labels** or milestones on the right:
          - Examples: `priority: high`, `priority: medium`, `priority: low`, or sprint-specific milestones.
        - Use these consistently so the backlog view reflects true urgency and impact.

        ---

        ✅ **Labels & Organization**

        **Team Labels**
        Apply the correct **Team label** after selecting your team above:
        - `bmt-team-1` → Mavericks
        - `bmt-team-2` → Bee's Knees
        - `bmt-team-3` → Phoenix
        - Or another team label if applicable

        **Issue Type Labels**
        Make sure you select the right **Issue Type** in the dropdown above:
        - **Task** → Work to be done, implementation steps
        - **Bug** → Defect, error, or unexpected behavior
        - **Enhancement** → Improvement or optimization to existing functionality
        - **Question** → Clarification or decision needed
        - **Design** → UX/UI design, mockups, prototypes, content changes
        - **Spike** → Timeboxed research or investigation
        - **Other**

        **Feature Labels**
        Use labels to identify which product area the issue belongs to:
        - `doc-status`
        - `evidence-requests`
        - `intent-to-file`
        - Or other feature-specific labels as appropriate

        **Discipline Labels**
        Apply labels to indicate the discipline or focus area:
        - `ux`
        - `engineering`
        - `frontend`
        - `backend`
        - `content`
        - Or other discipline labels as appropriate

        **Organization Labels**
        Apply these labels to indicate cross-functional or process-related states that support workflow organization and team collaboration:
        - **needs-refinement** → Apply this label to issues that require additional clarification, grooming, or estimation before prioritization. Remove this label once the issue has been refined and is ready for sprint planning.
